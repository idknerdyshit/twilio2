name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Show toolchain
        run: rustup show active-toolchain

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Run clippy with all features
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --locked

      - name: Run tests with all features
        run: cargo test --locked --all-features

      - name: Test native TLS feature
        run: cargo test --locked --no-default-features --features async,native-tls

      - name: Test rustls no-provider feature
        run: cargo test --locked --no-default-features --features async,rustls-no-provider

      - name: Verify package
        if: matrix.os == 'ubuntu-latest'
        run: cargo publish --dry-run --locked
